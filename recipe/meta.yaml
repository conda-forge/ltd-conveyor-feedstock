{% set name = "ltd-conveyor" %}
{% set version = "0.8.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ltd_conveyor-{{ version }}.tar.gz
  sha256: c98f9d447337a6f990c34e4a75d7dab6706aad59a586f6f20a43a6032dd38d29
  patches:
    - 0001-Patch-package_name-to-version_option-call.patch

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"
  entry_points:
    - ltd = ltdconveyor.cli.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - setuptools
    - setuptools_scm
    - boto3
    - requests
    - uritemplate
    - click
    - importlib-metadata

test:
  commands:
    - ltd --version
    - ltd --help
    - ltd upload --help

about:
  home: https://github.com/lsst-sqre/ltd-conveyor
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Conveyor command-line app for LSST the Docs (LTD) services and clients.'
  # The remaining entries in this section are optional, but recommended.
  description: |
    LSST the Docs (LTD) is a scalable service for hosting versioned static
    documentation projects that was originally built for the Vera C. Rubin
    Observatory. LTD Conveyor is the command-line client for uploading
    documentation builds and administering an LTD deployment.
  doc_url: https://ltd-conveyor.lsst.io/
  dev_url: https://github.com/lsst-sqre/ltd-conveyor

extra:
  recipe-maintainers:
    - jonathansick
